<div class="sidebar-container">
  <div class="header-box">
    <div class="dot"></div>
    <h2 class="ranking-title">Ranking Drużyn</h2>
  </div>

  <div class="teams-ranking-grid" *ngIf="currentTeamName$ | async as activeName; else loading">
    <div
      *ngFor="let team of sortedTeams; let i = index"
      class="team-leaderboard-card"
      [class.is-active]="activeName === team.name"
    >
      <div class="active-turn-indicator" *ngIf="activeName === team.name">
        <mat-icon style="font-size: 14px; width: 14px; height: 14px;">play_arrow</mat-icon>
        TWOJA TURA
      </div>

      <div class="rank-badge" [ngClass]="(i < 3) ? 'rank-' + (i + 1) : 'rank-default'">
        {{ i + 1 }}
      </div>

      <div class="avatar-section">
        <img [src]="team.avatarUrl" [alt]="team.name" class="large-team-avatar" />
      </div>

      <div class="team-details">
        <span class="team-name" style="color: #f8fafc !important;">{{ team.name }}</span>

        <div class="team-points-row">
          <span class="points-label">PUNKTY</span>
          <span class="points-value" style="color: #3b82f6 !important;">{{ team.points }}</span>
        </div>
      </div>
    </div>
  </div>

  <ng-template #loading>
    <div class="no-teams-message">
      <mat-icon style="opacity: 0.3; font-size: 30px; width: 30px; height: 30px;">hourglass_empty</mat-icon>
      <p>Oczekiwanie na start gry...</p>
    </div>
  </ng-template>
</div>
