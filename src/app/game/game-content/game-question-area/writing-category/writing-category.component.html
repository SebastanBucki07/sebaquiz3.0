<ng-container *ngIf="question as q">
  <mat-card class="question-card">
    <h2>{{ q.question }}</h2>
  </mat-card>

  <app-writing-score-board
    [teams]="teams"
    [activeTeamId]="currentTeam?.id ?? null"
    [maxChances]="MAX_CHANCES"
  ></app-writing-score-board>

  <app-game-status
    [gameFinished]="gameFinished"
    [winner]="winner"
    [remainingAnswers]="getRemaining()"
  ></app-game-status>

  <app-writing-controls
    *ngIf="!gameFinished && currentTeam"
    [currentTeam]="currentTeam"
    (answerSubmitted)="submitAnswer($event)"
  ></app-writing-controls>

  <div class="answers-wrapper" [class.flash]="wrongFlash">
    <div class="answer-box" *ngFor="let answer of q.answers; let i = index">
      <div class="flip-card">
        <div class="flip-card-inner" [class.flipped]="isRevealed(i)">
          <div class="flip-card-front"></div>

          <div
            class="flip-card-back"
            [style.background-color]="getAnswerColor(i)"
            [class.unanswered]="gameFinished && !answerOwners[i]"
          >
            <div class="answer-text">{{ answer.value }}</div>
            <div class="answer-owner" *ngIf="getOwnerName(i) as ownerName">
              {{ ownerName }}
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</ng-container>
