<div class="counter-wrapper" *ngIf="!gameFinished">
  <div class="counter-badge">
    <span class="counter-label">Pozostało</span>
    <span class="counter-number">{{ remainingAnswers }}</span>
  </div>
</div>

<mat-card class="result-card" *ngIf="gameFinished">
  <div *ngIf="winner; else noWinner" class="winner-container">
    <h2 class="winner-title">🏆 KONIEC RUNDY 🏆</h2>
    <div class="winner-avatar-wrapper">
      <img [src]="winner.avatarUrl" class="winner-avatar" [alt]="winner.name" />
    </div>
    <h2 class="winner-name">{{ winner.name }} wygrywa!</h2>
    <div class="winner-score">
      <h3>
        Zdobyte punkty:
        <span>{{ winner.calculatedPoints }}</span>
      </h3>
    </div>
  </div>

  <ng-template #noWinner>
    <div class="no-winner">
      <p>Gra zakończona - brak zwycięzcy</p>
    </div>
  </ng-template>
</mat-card>
