<app-tips [hints]="hints" (hintUsed)="onHintUsed($event)"></app-tips>

<div class="question-image-container">
  <div class="image-wrapper" *ngIf="question$ | async as question">
    <img [src]="getImageSrc(question)" class="main-img" alt="quiz image" />

    <div class="grid">
      <div *ngFor="let tile of tiles" class="tile" [class.revealed]="tile"></div>
    </div>
  </div>
</div>
