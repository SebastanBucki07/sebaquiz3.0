<div class="music-category-wrapper">
  <div style="display: none">
    <iframe
      id="music-iframe"
      [src]="iframeSrc"
      width="0"
      height="0"
      frameborder="0"
      allow="autoplay"
    ></iframe>
  </div>

  <ng-container *ngIf="question$ | async as question">
    <app-music-tips
      [answerLabel]="question.answers?.[0]?.label ?? ''"
      (playIntro)="playIntro()"
      (playMiddle)="playMiddle()"
      (playOutro)="playOutro()"
      (hintUsed)="onHintUsed($event)"
    ></app-music-tips>

    <div *ngIf="answersVisible" style="margin-top: 20px">
      <div *ngFor="let answer of question.answers">
        <strong>{{ answer.label }}:</strong>
        {{ answer.value }}
      </div>
    </div>
  </ng-container>
</div>
