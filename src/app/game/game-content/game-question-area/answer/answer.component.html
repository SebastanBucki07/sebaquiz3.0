<div *ngIf="question$ | async as currentQuestion" class="answers-reveal-container">
  <ng-container *ngIf="currentQuestion.answers.length <= 2">
    <div *ngFor="let answer of currentQuestion.answers; let i = index" class="answer-block">

      <button
        mat-button
        class="answer-reveal-btn"
        (click)="revealAnswer(i)"
        [disabled]="(currentQuestion.revealedAnswers ?? []).includes(i)"
      >
        <mat-icon *ngIf="!(currentQuestion.revealedAnswers ?? []).includes(i)">visibility</mat-icon>
        <mat-icon *ngIf="(currentQuestion.revealedAnswers ?? []).includes(i)">visibility_off</mat-icon>
        Pokaż {{ answer.label || 'odpowiedź ' + (i + 1) }}
      </button>

      <div
        *ngIf="(currentQuestion.revealedAnswers ?? []).includes(i) && !answer.value.includes('rows')"
        class="answer-text-box revealed"
      >
        <div class="answer-label-dark">
          {{ answer.label || 'Odpowiedź ' + (i + 1) }}
        </div>
        <div class="answer-value-text">
          {{ answer.value }}
        </div>
      </div>
    </div>
  </ng-container>

  <app-answer-buttons
    *ngIf="showAnswerButtons"
    (correct)="correct.emit()"
    (wrong)="wrong.emit()"
    (half)="half.emit()"
  ></app-answer-buttons>
</div>
