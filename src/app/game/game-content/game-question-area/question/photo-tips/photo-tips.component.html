<div class="photo-hints-container" *ngIf="hints.length > 0; else noHints">
  <mat-card class="hint-card-dark" *ngFor="let hint of hints" (click)="useHint(hint)">
    <div class="hint-image-wrapper">
      <img [src]="hint.content" [alt]="hint.label" />
      <div class="card-overlay"></div>
    </div>
    <div class="hint-footer-dark">
      <span class="hint-label-neon">{{ hint.label }}</span>
    </div>
  </mat-card>
</div>

<ng-template #noHints>
  <div class="no-hints-wrapper">
    <p class="no-hints-text">Brak podpowiedzi dla tej kategorii</p>
  </div>
</ng-template>
