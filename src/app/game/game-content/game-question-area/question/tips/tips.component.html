<div class="hints-accordion-wrapper" *ngIf="hints.length > 0; else noHints">
  <mat-accordion multi>
    <mat-expansion-panel
      *ngFor="let hint of hints; let i = index"
      [expanded]="i === 0 || isRevealed(hint)"
      (opened)="showHint(hint)"
      class="custom-hint-panel"
    >
      <mat-expansion-panel-header>
        <mat-panel-title class="hint-title-text">
          <mat-icon class="hint-icon">lock_open</mat-icon>
          {{ hint.label }}
          <span class="penalty-badge">-{{ hint.penaltyPercent }}%</span>
        </mat-panel-title>
      </mat-expansion-panel-header>

      <div class="hint-content-box">
        <p>{{ hint.content }}</p>
      </div>
    </mat-expansion-panel>
  </mat-accordion>
</div>

<ng-template #noHints>
  <div class="no-hints-container">
    <p class="no-hints">Brak podpowiedzi dla tej kategorii</p>
  </div>
</ng-template>
