<div class="familiada-layout" *ngIf="question$ | async as question">

  <div class="game-header">
    <div class="player-info">
      AKTUALNY GRACZ:
      <span class="name-highlight">{{ currentTeamName || '---' }}</span>
    </div>

    <div class="status-display-area">
      <div class="mistakes-row" *ngIf="!gameFinished; else finalScoreView">
        <div *ngFor="let m of [1, 2, 3]"
             class="x-mark"
             [class.active]="mistakes >= m">
          X
        </div>
      </div>

      <ng-template #finalScoreView>
        <div class="final-result-overlay">
          <div class="finish-label">RUNDA ZAKOŃCZONA</div>
          <div class="score-badge">+{{ earnedPoints }} pkt</div>
        </div>
      </ng-template>
    </div>
  </div>

  <div class="board-frame">
    <div class="question-text">{{ question.question }}</div>

    <div class="answers-grid">
      <div *ngFor="let ans of question.answers; let i = index" class="answer-slot">
        <div class="slot-inner" [class.revealed]="(question.revealedAnswers || []).includes(i)">
          <span class="slot-number">{{ i + 1 }}</span>
          <span class="slot-text">
    {{ (question.revealedAnswers || []).includes(i) ? ans.value : '' }}
  </span>
        </div>
      </div>
    </div>
  </div>

  <div class="game-footer">
    <div class="input-container">
      <input
        [(ngModel)]="inputValue"
        (keyup.enter)="submitAnswer()"
        [disabled]="gameFinished || mistakes >= MAX_CHANCES"
        [placeholder]="gameFinished ? 'Runda zakończona' : 'Wpisz odpowiedź...'"
        class="fam-input"
      />
    </div>
  </div>

</div>
