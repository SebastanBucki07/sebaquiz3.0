<div
  class="familiada-layout"
  [class.wrong-flash]="gameCore.wrongFlash$ | async"
  *ngIf="question$ | async as question"
>
  <div class="top-controls" *ngIf="!gameFinished">
    <app-writing-controls
      [currentTeam]="currentTeamData"
      (answerSubmitted)="submitAnswer($event)"
    ></app-writing-controls>
  </div>

  <div class="simple-status-bar">
    <div class="team-name">{{ currentTeamName }}</div>
    <div class="mistakes-display">
      <span *ngFor="let m of [1, 2, 3]" class="simple-x" [class.active]="mistakes >= m">X</span>
    </div>
    <div class="current-points" *ngIf="gameFinished">WYNIK: {{ earnedPoints }} PKT</div>
  </div>

  <div class="board-frame">
    <div class="question-text">{{ question.question }}</div>
    <div class="answers-grid">
      <div *ngFor="let ans of question.answers; let i = index" class="answer-slot">
        <div class="slot-inner" [class.revealed]="(question.revealedAnswers || []).includes(i)">
          <span class="slot-number">{{ i + 1 }}</span>
          <span class="slot-text">
            {{ (question.revealedAnswers || []).includes(i) ? ans.value : '' }}
          </span>
        </div>
      </div>
    </div>
  </div>

  <app-writing-game-status
    *ngIf="gameFinished"
    [winner]="winnerForStatus"
    [gameFinished]="gameFinished"
  ></app-writing-game-status>
</div>
