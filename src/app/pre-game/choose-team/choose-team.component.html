<div class="team-container">
  <div class="header">
    <h2>Zarządzanie Drużynami</h2>
  </div>

  <mat-card class="add-team-card">
    <mat-card-content class="add-team-content">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Nazwa nowej drużyny</mat-label>
        <input
          matInput
          [(ngModel)]="newTeamName"
          #teamInput="ngModel"
          (keyup.enter)="teamInput.valid && addTeam()"
          placeholder="Np. Smocze Kły"
          required
          minlength="4"
        />
        <mat-error *ngIf="teamInput.hasError('minlength')">Minimum 4 znaki!</mat-error>
      </mat-form-field>

      <button mat-flat-button color="primary" (click)="addTeam()" [disabled]="teamInput.invalid">
        <mat-icon>group_add</mat-icon>
        Dodaj
      </button>
    </mat-card-content>
  </mat-card>

  <mat-card *ngIf="teams.length > 0" class="table-card">
    <mat-card-content>
      <table mat-table [dataSource]="teams" class="teams-table">

        <ng-container matColumnDef="avatar">
          <th mat-header-cell *matHeaderCellDef> Bohater </th>
          <td mat-cell *matCellDef="let team">
            <div class="avatar-container">
              <img [src]="team.avatarUrl" [alt]="team.name" class="team-avatar">
            </div>
          </td>
        </ng-container>

        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef> # </th>
          <td mat-cell *matCellDef="let team">{{ team.id }}</td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef> Drużyna </th>
          <td mat-cell *matCellDef="let team"><strong>{{ team.name }}</strong></td>
        </ng-container>

        <ng-container matColumnDef="points">
          <th mat-header-cell *matHeaderCellDef> Punkty </th>
          <td mat-cell *matCellDef="let team">
            <span class="points-badge">{{ team.points }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef> Akcje </th>
          <td mat-cell *matCellDef="let team">
            <button mat-icon-button color="warn" (click)="removeTeam(team.id)">
              <mat-icon>delete_outline</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
