<div class="team-container">
  <div class="header-box">
    <div class="dot"></div>
    <h2>Zarządzanie Drużynami</h2>
  </div>

  <div class="add-team-card">
    <div class="add-team-content">
      <mat-form-field appearance="outline" class="custom-form-field">
        <mat-label>Nazwa nowej drużyny</mat-label>
        <input
          matInput
          [(ngModel)]="newTeamName"
          #teamInput="ngModel"
          (keyup.enter)="teamInput.valid && addTeam()"
          placeholder="Np. Smocze Kły"
          required
          minlength="4"
          autocomplete="off"
        />
        <mat-error *ngIf="teamInput.hasError('minlength')">Minimum 4 znaki!</mat-error>
        <mat-error *ngIf="teamInput.hasError('required')">Nazwa jest wymagana</mat-error>
      </mat-form-field>

      <button class="add-btn" [disabled]="teamInput.invalid" (click)="addTeam()">
        <mat-icon>group_add</mat-icon>
        DODAJ
      </button>
    </div>
  </div>

  <div class="cards-list" *ngIf="teams.length > 0">
    <div *ngFor="let team of teams" class="team-row-custom">
      <div class="team-info-left">
        <img [src]="team.avatarUrl" [alt]="team.name" class="team-avatar" />
        <span class="team-name-text">{{ team.name }}</span>
      </div>

      <div class="team-info-right">
        <span class="pts-display">{{ team.points }} PKT</span>
        <button class="mini-remove" (click)="removeTeam(team.id)">
          <mat-icon>delete_outline</mat-icon>
        </button>
      </div>
    </div>
  </div>

  <div class="empty-state" *ngIf="teams.length === 0">
    <mat-icon>groups</mat-icon>
    <p>Brak dodanych drużyn. Dodaj pierwszą powyżej!</p>
  </div>
</div>
