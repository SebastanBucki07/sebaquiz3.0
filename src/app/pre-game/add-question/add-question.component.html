<div class="container">
  <h2>Panel Administratora: Dodaj Pytanie</h2>

  <form [formGroup]="questionForm" (ngSubmit)="onSubmit()">
    <label for="category">Kategoria quizu:</label>
    <select id="category" formControlName="category">
      <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
    </select>

    <label for="question">Treść pytania (lub YouTube ID):</label>
    <textarea
      id="question"
      formControlName="question"
      placeholder="Wpisz treść pytania..."
    ></textarea>

    <div class="form-section" formArrayName="answers">
      <h3>
        Odpowiedzi
        <button type="button" class="btn-add" (click)="addAnswer()">+ Dodaj</button>
      </h3>

      <div
        *ngFor="let ans of answers.controls; let i = index"
        [formGroupName]="i"
        class="array-item"
      >
        <input formControlName="label" placeholder="Etykieta (opcjonalnie)" />
        <input formControlName="value" placeholder="Poprawna odpowiedź" />
        <button
          type="button"
          class="btn-remove"
          (click)="removeAnswer(i)"
          *ngIf="answers.length > 1"
        >
          ×
        </button>
      </div>
    </div>

    <div class="form-section" formArrayName="hints">
      <h3>
        Podpowiedzi
        <button type="button" class="btn-add" (click)="addHint()">+ Dodaj</button>
      </h3>

      <div
        *ngFor="let hint of hints.controls; let i = index"
        [formGroupName]="i"
        class="array-item hint-item"
      >
        <input formControlName="content" placeholder="Treść podpowiedzi" />
        <input type="number" formControlName="penaltyPercent" placeholder="% kary" />
        <button type="button" class="btn-remove" (click)="removeHint(i)">×</button>
      </div>
    </div>

    <button type="submit" class="btn-submit" [disabled]="questionForm.invalid">
      ZAPISZ W BAZIE SUPABASE
    </button>
  </form>
</div>
