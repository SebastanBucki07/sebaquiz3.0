<div class="modern-wrapper">
  <div class="main-grid">
    <section class="content-area">
      <div class="global-actions" *ngIf="hasAvailableCategories()">
        <button class="add-all-btn" (click)="addAllCategories()">
          <mat-icon>library_add</mat-icon>
          Dodaj wszystkie dostępne kategorie
        </button>
      </div>

      <div class="group-container" *ngFor="let group of groupedCategories | keyvalue">
        <ng-container *ngIf="getAvailableInGroup(group.value).length > 0">
          <div class="group-header">
            <span class="group-dot" [ngStyle]="{'background-color': 'hsl(' + (typeHues[group.key.toLowerCase()] || 250) + ', 70%, 50%)'}"></span>
            <h3>{{ group.key }}</h3>
          </div>

          <div class="bento-items">
            <div
              *ngFor="let cat of getAvailableInGroup(group.value); let i = index"
              class="category-card"
              [ngStyle]="getCategoryStyle(cat, i, group.value.length)"
              (click)="addCategory(cat)"
            >
              <span class="name">{{ cat.name }}</span>
              <div class="card-footer">
                <span class="points">{{ cat.basePoints }} pkt</span>
                <mat-icon>add</mat-icon>
              </div>
            </div>
          </div>
        </ng-container>
      </div>
    </section>

    <aside class="sidebar-area">
      <div class="floating-panel">
        <div class="panel-header">
          <h2>Wybrane <span>({{ selectedCategories.length }})</span></h2>
          <button class="clear-btn" (click)="removeAllCategories()" *ngIf="selectedCategories.length > 0">
            Reset
          </button>
        </div>

        <div class="selected-list-scroll">
          <div class="empty-state" *ngIf="selectedCategories.length === 0">
            <mat-icon>ads_click</mat-icon>
            <p>Kliknij kategorie po lewej,<br>aby przygotować zestaw.</p>
          </div>

          <div class="selected-items-grid">
            <div
              *ngFor="let cat of selectedCategories; let i = index"
              class="mini-card"
              [ngStyle]="getCategoryStyle(cat, i, selectedCategories.length, true)"
            >
              <span class="cat-name">{{ cat.name }}</span>
              <button (click)="removeCategory(cat)" class="remove-btn">
                <mat-icon>close</mat-icon>
              </button>
            </div>
          </div>
        </div>

      </div>
    </aside>
  </div>
</div>
